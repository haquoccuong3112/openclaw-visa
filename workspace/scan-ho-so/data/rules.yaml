# ============================================================================
# Bộ rule data-driven của bot @donghanhprocessingbot
# ============================================================================
# Cấu trúc 2 phần:
#
#   checklist:    26 mục FARM (ALLY) — KH phải có những giấy gì.
#                 - severity: bat_buoc | ket_hon | co_con | tuy_chon | lam_sau
#                 - Mục bat_buoc đếm vào "X/18 mục bắt buộc"
#                 - Mục ket_hon chỉ áp dụng nếu KH đã kết hôn (suy từ GKH)
#                 - Mục co_con chỉ áp dụng nếu KH có con (suy từ >=2 GKS hoặc có XN hoc)
#
#   validations:  56 rule v1.1 — KIỂM TRA TỪNG giấy tờ có hợp lệ không.
#                 - severity: reject | warn | info
#                   reject = giấy không dùng được, BÁO ngay (vd thế chấp)
#                   warn   = cần làm rõ / sửa
#                   info   = ghi nhận / nhắc nhở
#                 - applies_to: list[tag] giấy tờ mà rule áp dụng
#                 - condition: biểu thức Python-like trên `profile`
#                   để bot tự check deterministic ngoài LLM (NULL = LLM phải kiểm)
#                 - needs_llm: true ⇒ rule cần LLM reasoning (vd phẫu thuật thẩm mỹ,
#                   khớp chữ ký, cross-validation giữa giấy tờ)
#                 - code: "1.1" — đúng theo v1.1 doc hoặc "FARM-1" cho rule FARM
#
# Cách add rule mới: thêm entry vào danh sách thích hợp, lưu file, restart bot.
# Schema: lib/rule_loader.py
# ============================================================================

schema_version: 1

# ============================================================================
# CHECKLIST FARM — 26 mục giấy tờ KH phải có (coverage check)
# ============================================================================
checklist:
  # === I. HỒ TỊCH (BẮT BUỘC) ===
  - code: "FARM-1"
    name: "Hộ chiếu đương đơn (gồm HC cũ nếu có)"
    tags: [Passport]
    severity: bat_buoc

  - code: "FARM-2"
    name: "Giấy khai sinh đương đơn + vợ/chồng"
    tags: [GKS]
    severity: bat_buoc

  - code: "FARM-5"
    name: "CCCD đương đơn + vợ/chồng/con"
    tags: [CCCD]
    severity: bat_buoc

  - code: "FARM-6"
    name: "Giấy xác nhận cư trú CT07 (mới nhất)"
    tags: [XNCT]
    severity: bat_buoc

  - code: "FARM-7"
    name: "Lý lịch tư pháp số 2 (≤6 tháng)"
    tags: [LLTP]
    severity: bat_buoc

  - code: "FARM-9"
    name: "Ảnh thẻ 5x7 (phông trắng, có bản digital)"
    tags: [Anh the]
    severity: bat_buoc

  - code: "FARM-10"
    name: "Bằng cấp & chứng chỉ"
    tags: [Bang cap]
    severity: bat_buoc

  # === II. TÀI SẢN (BẮT BUỘC) ===
  - code: "FARM-11-12"
    name: "Giấy tờ tài sản (sổ đỏ HOẶC HĐ cho/tặng-thừa kế)"
    tags: [So dat, HD cho-tang-thua ke]
    severity: bat_buoc

  - code: "FARM-13-14"
    name: "Chứng minh nghề nông (sổ đỏ đất NN HOẶC ĐKKD HTX)"
    tags: [So dat NN, DKKD]
    severity: bat_buoc

  - code: "FARM-15"
    name: "Sổ tiết kiệm (≥300-400tr, kỳ hạn ≥6 tháng)"
    tags: [STK]
    severity: bat_buoc

  - code: "FARM-17"
    name: "Sao kê ngân hàng (3-6 tháng gần nhất)"
    tags: [Sao ke]
    severity: bat_buoc

  - code: "FARM-19a"
    name: "Biên lai BHXH tự nguyện (3 tháng gần nhất)"
    tags: [BHXH]
    severity: bat_buoc

  - code: "FARM-19b"
    name: "Biên lai BHYT (3 tháng gần nhất)"
    tags: [BHYT]
    severity: bat_buoc

  # === III. CÔNG VIỆC & THÔNG TIN (BẮT BUỘC) ===
  - code: "FARM-21"
    name: "Thông tin cá nhân & gia đình (sơ yếu lý lịch)"
    tags: [CV]
    severity: bat_buoc

  - code: "FARM-22"
    name: "Thẻ Visa/Mastercard quốc tế (ảnh 2 mặt)"
    tags: [The Visa-MC]
    severity: bat_buoc

  - code: "FARM-23"
    name: "Thông tin 2 đại lý nông sản/phân bón"
    tags: [Dai ly NS]
    severity: bat_buoc

  - code: "FARM-25"
    name: "Ảnh chụp gia đình"
    tags: [Anh gia dinh]
    severity: bat_buoc

  - code: "FARM-26"
    name: "Ảnh & video làm nông"
    tags: [Anh-video lam nong]
    severity: bat_buoc

  # === ĐIỀU KIỆN ===
  - code: "FARM-3"
    name: "Giấy đăng ký kết hôn / giấy ly hôn"
    tags: [GKH]
    severity: ket_hon

  - code: "FARM-2b"
    name: "Giấy khai sinh của con"
    tags: [GKS_con]   # special tag: >=2 GKS = đủ
    severity: co_con

  - code: "FARM-4"
    name: "Giấy xác nhận con đang học"
    tags: [XN hoc]
    severity: co_con

  # === NẾU CÓ / TĂNG HỒ SƠ ===
  - code: "FARM-8"
    name: "Bằng lái xe ô tô"
    tags: [GPLX]
    severity: tuy_chon

  - code: "FARM-18"
    name: "Cà vẹt xe / hoá đơn mua vàng"
    tags: [Ca vet xe, Vang]
    severity: tuy_chon

  - code: "FARM-24"
    name: "Giấy công ích / bằng khen / thư cảm ơn"
    tags: [Bang khen]
    severity: tuy_chon

  # === LÀM / BỔ SUNG SAU ===
  - code: "FARM-16"
    name: "Giấy xác nhận số dư sổ TK (EN/song ngữ)"
    tags: [XN so du]
    severity: lam_sau

  - code: "FARM-20"
    name: "Khám sức khỏe IOM"
    tags: [IOM]
    severity: lam_sau

# ============================================================================
# VALIDATION RULES — 56 rule kiểm tra từng giấy tờ (theo v1.1)
# ============================================================================
# `condition`: biểu thức rule_engine (Phase 3) eval trên `profile` để
# deterministic pre-check (không cần LLM). NULL = LLM phải kiểm.
# `needs_llm`: true ⇒ rule cần LLM (reasoning, cross-validation, visual)
# ============================================================================
validations:

  # === I. HỒ TỊCH — HỘ CHIẾU ===
  - code: "1.1"
    category: ho_tich
    severity: warn
    applies_to: [Passport]
    rule: "Hộ chiếu còn hạn ≥ 2 năm tính từ ngày dự kiến nộp visa"
    action: "Nhắc khách xin cấp lại nếu hạn < 2 năm"
    condition: "years_until(doc.extracted.ngay_het_han) < 2"
    needs_llm: false

  - code: "1.2"
    category: ho_tich
    severity: reject
    applies_to: [Passport]
    rule: "Đối chiếu ảnh trên hộ chiếu với ảnh thẻ — phát hiện dấu hiệu phẫu thuật thẩm mỹ"
    action: "BÁO người phụ trách (Mức 3 vision: dùng `_vision_compare.phau_thuat_signs` ground-truth)"
    condition: null
    needs_llm: true

  - code: "1.3"
    category: ho_tich
    severity: info
    applies_to: [Passport]
    rule: "Chữ ký trong hộ chiếu là chuẩn — toàn bộ hồ sơ phải ký GIỐNG HỆT chữ ký này"
    action: "Đối chiếu chữ ký xuyên toàn hồ sơ (BHXH/YT, hợp đồng…)"
    condition: null
    needs_llm: true

  - code: "1.4"
    category: ho_tich
    severity: warn
    applies_to: [Passport]
    rule: "Mộc xuất nhập cảnh — phát hiện đi nước ngoài"
    action: "BÁO người phụ trách (ghi rõ nước nào, thời gian)"
    condition: null
    needs_llm: true

  - code: "1.5"
    category: ho_tich
    severity: warn
    applies_to: [Passport]
    rule: "Nơi sinh trong hộ chiếu khớp giấy khai sinh"
    action: "Hỏi lại khách + BÁO người phụ trách nếu không khớp"
    condition: null
    needs_llm: true

  - code: "1.6"
    category: ho_tich
    severity: reject
    applies_to: [Passport]
    rule: "Nơi cấp hộ chiếu phải là Việt Nam"
    action: "BÁO NGAY nếu cấp bởi nước khác"
    condition: "doc.extracted.noi_cap and 'viet nam' not in lower(doc.extracted.noi_cap)"
    needs_llm: false

  - code: "1.7"
    category: ho_tich
    severity: warn
    applies_to: [Passport]
    rule: "Scan đủ TẤT CẢ trang có thông tin, dấu mộc, visa (cả HC cũ + mới)"
    action: "Yêu cầu khách bổ sung trang còn thiếu"
    condition: null
    needs_llm: true

  # === KHAI SINH ===
  - code: "2.1"
    category: ho_tich
    severity: reject
    applies_to: [GKS]
    rule: "Họ tên + ngày sinh trên KS khớp 100% với CCCD + HC của đương đơn"
    action: "Báo lỗi nếu lệch ký tự"
    condition: null
    needs_llm: true

  - code: "2.2"
    category: ho_tich
    severity: warn
    applies_to: [GKS]
    rule: "Họ tên + năm sinh bố/mẹ trên KS khớp CCCD bố/mẹ (nếu có)"
    action: "Đối chiếu với CCCD bố/mẹ trong hồ sơ"
    condition: null
    needs_llm: true

  - code: "2.3"
    category: ho_tich
    severity: warn
    applies_to: [GKS]
    rule: "Đối chiếu KS với CT07 + sổ đất + giấy liên quan"
    action: "Ghi chú cụ thể + BÁO nếu mâu thuẫn"
    condition: null
    needs_llm: true

  # P3.3 — Cross-doc deterministic rule (eval trên `profile`, không phải per-doc).
  - code: "2.4"
    category: ho_tich
    severity: reject
    applies_to: [_profile]
    rule: "Năm sinh CỦA BỐ HOẶC MẸ phải nhất quán trên mọi giấy tờ (GKS + CCCD bố/mẹ + GPLX + HĐ tặng đất…)"
    action: "Nghiêm trọng — yêu cầu xin lại / đối chiếu, có thể lỗi pháp lý ở giấy tờ liên quan"
    condition: "parent_dob_mismatch(profile)"
    needs_llm: false

  # === KẾT HÔN / LY HÔN ===
  - code: "3.1"
    category: ho_tich
    severity: reject
    applies_to: [GKH, Ly hon]
    rule: "Họ tên + ngày sinh vợ/chồng trên ĐKKH khớp 100% CCCD + GKS"
    action: "Báo lỗi nếu lệch"
    condition: null
    needs_llm: true

  - code: "3.2"
    category: ho_tich
    severity: info
    applies_to: [GKH]
    rule: "Ghi nhớ ngày kết hôn — KHÔNG khai timeline công việc trùng vào ngày này"
    action: "Lưu vào hồ sơ để đối chiếu khi lập timeline"
    condition: null
    needs_llm: true

  - code: "3.3"
    category: ho_tich
    severity: warn
    applies_to: [Ly hon]
    rule: "Xin đủ thông tin vợ/chồng cũ: họ tên, DOB, ngày kết hôn, ngày ly hôn"
    action: "Bổ sung thông tin nếu thiếu"
    condition: null
    needs_llm: true

  # === CCCD ===
  - code: "4.1"
    category: ho_tich
    severity: reject
    applies_to: [CCCD]
    rule: "Thông tin cá nhân trên CCCD khớp KS + HC"
    action: "Báo lỗi nếu lệch"
    condition: null
    needs_llm: true

  - code: "4.2"
    category: ho_tich
    severity: warn
    applies_to: [CCCD]
    rule: "Scan đủ 2 mặt + ảnh rõ nét đọc được toàn bộ thông tin"
    action: "Yêu cầu scan lại nếu thiếu mặt / mờ"
    condition: null
    needs_llm: true

  - code: "4.3"
    category: ho_tich
    severity: warn
    applies_to: [CCCD]
    rule: "Mặt sau CCCD có đủ 2 ô dấu vân tay (ngón trỏ trái + phải)"
    action: "BÁO nếu thiếu hoặc khách bị cụt ngón tay"
    # Vision flag từ Gemini OCR (Mức 1) — false ⇒ thiếu/cụt vân tay
    condition: "doc.extracted.co_2_o_van_tay == false"
    needs_llm: false

  # === CT07 ===
  - code: "5.1"
    category: ho_tich
    severity: warn
    applies_to: [XNCT]
    rule: "CT07 ghi đủ TẤT CẢ thành viên đang sống cùng (vợ/chồng/con/cha/mẹ)"
    action: "Yêu cầu xin lại + bổ sung đủ nếu thiếu thành viên"
    condition: null
    needs_llm: true

  - code: "5.2"
    category: ho_tich
    severity: warn
    applies_to: [XNCT]
    rule: "CT07 còn hiệu lực (ngày cấp gần ngày nộp visa)"
    action: "Yêu cầu xin lại nếu giấy cũ quá"
    condition: null
    needs_llm: true

  # P3.3 — Cross-doc deterministic rule (eval trên `profile`).
  - code: "5.3"
    category: ho_tich
    severity: warn
    applies_to: [_profile]
    rule: "Mọi con (từ GKS / XN học) phải có tên trong danh sách thanh_vien_ho_khau của XNCT"
    action: "Cảnh báo + yêu cầu xin lại XNCT đủ thành viên (làm yếu ràng buộc gia đình)"
    condition: "children_missing_from_xnct(profile)"
    needs_llm: false

  # === LLTP ===
  - code: "6.1"
    category: ho_tich
    severity: reject
    applies_to: [LLTP]
    rule: "Thông tin cá nhân + bố/mẹ/vợ-chồng + địa chỉ trên LLTP khớp CCCD"
    action: "Báo lỗi nếu lệch"
    condition: null
    needs_llm: true

  - code: "6.2"
    category: ho_tich
    severity: reject
    applies_to: [LLTP]
    rule: "LLTP còn hạn ≤ 6 tháng tính từ ngày cấp đến ngày dự kiến nộp visa"
    action: "Nhắc khách xin cấp lại nếu sắp hết hạn"
    condition: "months_since(doc.extracted.ngay_cap) > 6"
    needs_llm: false

  - code: "6.3"
    category: ho_tich
    severity: reject
    applies_to: [LLTP]
    rule: "KHÔNG khai báo tạm trú nếu địa chỉ khác địa chỉ xác minh kinh nghiệm làm việc"
    action: "BÁO NGAY nếu phát hiện đã khai sai"
    condition: null
    needs_llm: true

  # === BẰNG LÁI / ẢNH THẺ ===
  - code: "7.1"
    category: ho_tich
    severity: info
    applies_to: [GPLX]
    rule: "Thu thập đầy đủ loại bằng lái khách có (A1/A/B1/B2/C)"
    action: "Lưu vào hồ sơ"
    condition: null
    needs_llm: true

  - code: "8.1"
    category: ho_tich
    severity: warn
    applies_to: [Anh the]
    rule: "Ảnh thẻ chụp trong vòng 6 tháng gần nhất"
    action: "Yêu cầu chụp lại nếu cũ hơn 6 tháng"
    condition: null
    needs_llm: true

  - code: "8.2"
    category: ho_tich
    severity: warn
    applies_to: [Anh the]
    rule: "Tiêu chuẩn ảnh thẻ tổng quát: mặt mộc, không trang sức, áo thun giản dị, tóc tối màu, che xăm, phông trắng"
    action: "Đánh dấu 'Cần kiểm tra' kèm tiêu chí không đạt"
    condition: null
    needs_llm: true

  # Vision flags từ Mức 1 — Gemini OCR check trực tiếp trên ảnh, deterministic
  - code: "8.2a"
    category: ho_tich
    severity: warn
    applies_to: [Anh the]
    rule: "Ảnh thẻ: KH phải mặt mộc (không son phấn, không kẻ mắt đậm)"
    action: "Yêu cầu chụp lại không trang điểm"
    condition: "doc.extracted.la_mat_moc == false"
    needs_llm: false

  - code: "8.2b"
    category: ho_tich
    severity: warn
    applies_to: [Anh the]
    rule: "Ảnh thẻ: KHÔNG đeo trang sức (bông tai, dây chuyền, vòng tay, kính thời trang)"
    action: "Yêu cầu tháo trang sức và chụp lại"
    condition: "doc.extracted.co_trang_suc == true"
    needs_llm: false

  - code: "8.2c"
    category: ho_tich
    severity: warn
    applies_to: [Anh the]
    rule: "Ảnh thẻ: KHÔNG được lộ hình xăm"
    action: "Yêu cầu che kín hình xăm và chụp lại"
    condition: "doc.extracted.co_xam_lo == true"
    needs_llm: false

  - code: "8.2d"
    category: ho_tich
    severity: warn
    applies_to: [Anh the]
    rule: "Ảnh thẻ: Tóc phải tối màu tự nhiên (đen/nâu sậm) — không nhuộm sáng / màu lạ"
    action: "Yêu cầu nhuộm lại tóc tối màu rồi chụp lại"
    condition: "doc.extracted.toc_toi_mau == false"
    needs_llm: false

  - code: "8.2e"
    category: ho_tich
    severity: warn
    applies_to: [Anh the]
    rule: "Ảnh thẻ: Phông nền phải trắng / xanh đơn sắc, đủ sáng — không phức tạp/lộn xộn"
    action: "Yêu cầu chụp lại với phông trắng"
    condition: "doc.extracted.phong_nen_trang == false"
    needs_llm: false

  - code: "8.3"
    category: ho_tich
    severity: warn
    applies_to: [Anh the]
    rule: "Ảnh thẻ KHÔNG trùng ảnh trong HC/bằng lái nếu HC/bằng lái > 6 tháng"
    action: "Yêu cầu ảnh mới (Mức 3 vision: dùng `_vision_compare` để check same_person + age_diff_months)"
    condition: null
    needs_llm: true

  # === BẰNG CẤP ===
  - code: "9.1"
    category: ho_tich
    severity: reject
    applies_to: [Bang cap]
    rule: "Họ tên + DOB trên bằng cấp khớp CCCD + KS"
    action: "Báo lỗi nếu lệch"
    condition: null
    needs_llm: true

  - code: "9.2"
    category: ho_tich
    severity: warn
    applies_to: [Bang cap]
    rule: "Năm cấp bằng khớp mốc thời gian khách khai đã học"
    action: "Hỏi lại khách mốc học từng cấp"
    condition: null
    needs_llm: true

  - code: "9.3"
    category: ho_tich
    severity: warn
    applies_to: [Bang cap]
    rule: "Scan đủ 2 mặt cho cấp 3 / cấp 2 / trung cấp / cao đẳng / đại học"
    action: "Yêu cầu bổ sung mặt còn thiếu"
    condition: null
    needs_llm: true

  # === IOM ===
  - code: "10.1"
    category: ho_tich
    severity: reject
    applies_to: [IOM]
    rule: "Thông tin passport trên giấy khám IOM khớp HC đã nộp"
    action: "BÁO NGAY nếu sai — ảnh hưởng nghiêm trọng đến hồ sơ"
    condition: null
    needs_llm: true

  - code: "10.2"
    category: ho_tich
    severity: warn
    applies_to: [IOM]
    rule: "Giấy khám IOM còn hạn ≤ 12 tháng tính từ ngày khám đến ngày nộp visa"
    action: "Đặt lịch khám lại tại IOM"
    condition: "months_since(doc.extracted.ngay_cap) > 12"
    needs_llm: false

  # === THÔNG TIN CÁ NHÂN & GIA ĐÌNH ===
  - code: "11.1"
    category: ho_tich
    severity: warn
    applies_to: [CV]
    rule: "Đương đơn khai đủ: tên/giới tính/DOB/nơi sinh/hôn nhân/địa chỉ qua thời gian/học tập/công tác/SĐT"
    action: "Bổ sung trường còn thiếu"
    condition: null
    needs_llm: true

  - code: "11.2"
    category: ho_tich
